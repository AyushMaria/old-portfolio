<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta http-equiv="refresh" content="0; url=https://ayushmaria.github.io/ayush-settlement/portfolio.html">
    <title>Redirecting to Ayush's Settlement...</title>
    <style>
        body {
            margin: 0;
            padding: 0;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #1a0a2e 0%, #16213e 50%, #0f3460 100%);
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            color: #fff;
        }
        .container {
            text-align: center;
            padding: 2rem;
        }
        h1 {
            font-size: 2.5rem;
            margin-bottom: 1rem;
            background: linear-gradient(to right, #ff6b35, #f7931e);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }
        p {
            font-size: 1.2rem;
            opacity: 0.9;
            margin-bottom: 2rem;
        }
        .loader {
            border: 4px solid rgba(255, 107, 53, 0.3);
            border-top: 4px solid #ff6b35;
            border-radius: 50%;
            width: 50px;
            height: 50px;
            animation: spin 1s linear infinite;
            margin: 0 auto;
        }
        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }
        a {
            color: #ff6b35;
            text-decoration: none;
            font-weight: bold;
            border: 2px solid #ff6b35;
            padding: 0.5rem 1rem;
            border-radius: 5px;
            transition: all 0.3s ease;
            display: inline-block;
            margin-top: 1rem;
        }
        a:hover {
            background: #ff6b35;
            color: #1a0a2e;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>🏯 Welcome to Ayush's Settlement 🏯</h1>
        <p>Redirecting you to the new portfolio...</p>
        <div class="loader"></div>
        <p style="margin-top: 2rem; font-size: 0.9rem; opacity: 0.7;">If you're not redirected automatically,</p>
        <a href="https://ayushmaria.github.io/ayush-settlement/portfolio.html">Click here to enter the settlement</a>
    </div>
</body>
</html>
